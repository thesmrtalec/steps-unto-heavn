<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>Steps unto Heav’n</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<style>
  :root {
    --page:#f4ead9; --card:#fbf4e7; --ink:#1f3050; --muted:#7d7868; --faint:#a39a85;
    --rule:#e0d4ba; --accent:#1f3050; --accent2:#a8842c; --onaccent:#f4ead9;
    --tagbg:#e9ddc2; --tagink:#6a5f48; --edge:#e0d4ba;
    --glow:none; --cardshadow:0 1px 2px rgba(80,40,20,.07);
    --st-concept:#8c8472; --st-bit:#1f3050; --st-ready:#a8842c;
    --serif:"Iowan Old Style",Palatino,"Palatino Linotype",Georgia,serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page:#071d33; --card:#10293f; --ink:#efe7d2; --muted:#9a917a; --faint:#7a735f;
      --rule:#1f3a52; --accent:#c9a44c; --accent2:#e4c170; --onaccent:#191305;
      --tagbg:#173249; --tagink:#a9bccd; --edge:#04141f;
      --glow:0 0 10px rgba(233,188,107,.45); --cardshadow:0 2px 6px rgba(0,0,0,.3);
      --st-concept:#8d9aa8; --st-bit:#c9a44c; --st-ready:#efe7d2;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; background: var(--page); color: var(--ink); font-family: var(--serif); -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 620px; margin: 0 auto; padding: 0 20px 72px; min-height: 100vh;
    border-left: 1px solid var(--edge); border-right: 1px solid var(--edge);
    background: url('data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22220%22%20height%3D%22220%22%3E%3Cfilter%20id%3D%22n%22%3E%3CfeTurbulence%20type%3D%22fractalNoise%22%20baseFrequency%3D%220.8%22%20numOctaves%3D%223%22%20stitchTiles%3D%22stitch%22/%3E%3CfeColorMatrix%20type%3D%22matrix%22%20values%3D%220%200%200%200%200.36%20%200%200%200%200%200.27%20%200%200%200%200%200.16%20%200%200%200%200.6%200%22/%3E%3C/filter%3E%3Crect%20width%3D%22220%22%20height%3D%22220%22%20filter%3D%22url%28%23n%29%22%20opacity%3D%220.16%22/%3E%3C/svg%3E');
    background-color: var(--page);
    box-shadow: inset 0 0 100px rgba(110, 70, 30, .10); }
  @media (prefers-color-scheme: dark) {
    .wrap { background: radial-gradient(ellipse 90% 300px at 50% -40px, rgba(233,188,107,.13), transparent 70%);
      box-shadow: none; }
  }
  button { cursor: pointer; font-family: inherit; transition: background .15s, color .15s, border-color .15s, transform .05s; }
  button:active { transform: translateY(1px); }
  button:focus-visible, textarea:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) { *, button { transition: none !important; } }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }

  /* ——— banner ——— */
  .bannerband { margin: 0 -20px 16px; border-bottom: 3px solid #a8842c; line-height: 0; }
  .banner { display: block; width: 100%; }
  .banner-night { display: none; }
  @media (prefers-color-scheme: dark) {
    .banner-day { display: none; }
    .banner-night { display: block; }
    .bannerband { border-bottom-color: #c9a44c; }
  }

  /* ——— accountability strip ——— */
  .strip { display: flex; flex-direction: column; gap: 11px; font-size: 14px; padding-bottom: 6px; margin-bottom: 8px; }
  .srow { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .slabel { font-family: var(--mono); font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
  .lab { font-family: var(--mono); font-size: 12.5px; color: var(--muted); }
  .lab strong { color: var(--accent2); font-size: 14px; }
  .quota-input { width: 46px; border: 1px solid var(--rule); border-radius: 5px; padding: 3px 5px; font-size: 12.5px; font-family: var(--mono); background: var(--card); color: var(--ink); }
  .last-mic { color: var(--faint); }
  .mic-btn { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); border-radius: 999px; padding: 4px 12px; font-size: 12px; font-family: var(--mono); letter-spacing: .03em; }
  .mic-btn:hover { background: var(--accent); color: var(--onaccent); }
  .undo-btn { background: transparent; border: none; color: var(--accent); font-size: 12.5px; text-decoration: underline; display: none; font-family: var(--mono); }
  .stairs { height: 38px; width: auto; margin-left: auto; }
  .stair { fill: var(--rule); transition: fill .25s; }
  .stair.lit { fill: var(--accent2); }
  .star { fill: var(--rule); transition: fill .25s; }
  .star.lit { fill: var(--accent2); filter: drop-shadow(0 0 4px rgba(201,164,76,.7)); }
  .riff-check { display: flex; align-items: center; gap: 9px; cursor: pointer; }
  .riff-check input { position: absolute; opacity: 0; width: 1px; height: 1px; }
  .stamp {
    border: 1.5px solid var(--rule); border-radius: 999px;
    padding: 4px 13px; font-size: 12px; font-family: var(--mono);
    letter-spacing: .03em; color: var(--faint); background: transparent;
    transition: background .15s, color .15s, border-color .15s, transform .12s;
  }
  .stamp .on { display: none; }
  .riff-check input:checked + .stamp {
    background: var(--accent); border-color: var(--accent);
    color: var(--onaccent); font-weight: 700; box-shadow: var(--glow);
  }
  .riff-check input:checked + .stamp .off { display: none; }
  .riff-check input:checked + .stamp .on { display: inline; }
  .riff-check input:focus-visible + .stamp { outline: 2px solid var(--accent); outline-offset: 2px; }
  .riff-check:active .stamp { transform: scale(.95); }
  .riff-week { color: var(--faint); font-size: 12.5px; font-family: var(--mono); }
  .plan-form { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .plan-form input { border: 1px solid var(--rule); border-radius: 5px; padding: 6px 8px; font-size: 14px; font-family: inherit; background: var(--card); color: var(--ink); }
  .plan-form input[type="text"] { flex: 1; min-width: 120px; }
  .planned-item { display: flex; align-items: center; gap: 8px; font-size: 13.5px; flex-wrap: wrap; background: var(--card); border: 1px solid var(--rule); border-left: 3px solid var(--accent); border-radius: 7px; padding: 8px 10px; }
  .planned-when { font-weight: 700; color: var(--accent2); font-family: var(--mono); font-size: 12.5px; }
  .planned-due { color: var(--accent2); font-style: italic; font-size: 13px; font-weight: 700; }
  .planned-note { color: var(--muted); }
  .planned-item button { border-radius: 999px; padding: 3px 10px; font-size: 11.5px; background: transparent; font-family: var(--mono); margin-left: auto; }
  .planned-item button + button { margin-left: 0; }
  .planned-did { border: 1px solid var(--accent); color: var(--accent); }
  .planned-did:hover { background: var(--accent); color: var(--onaccent); }
  .planned-skip { border: 1px solid var(--rule); color: var(--faint); }

  /* ——— capture ——— */
  .capture { display: flex; gap: 10px; margin-bottom: 26px; align-items: stretch; }
  textarea { flex: 1; border: 1px solid var(--rule); border-radius: 8px; padding: 12px 14px; font-size: 16px; font-family: var(--serif); line-height: 1.6; resize: vertical; min-height: 128px; color: var(--ink); background: var(--card); box-shadow: inset 0 1px 4px rgba(0,0,0,.12); }
  textarea::placeholder { color: var(--faint); font-style: italic; }
  .add-btn { background: var(--accent); color: var(--onaccent); border: none; border-radius: 8px; padding: 0 20px; font-size: 13px; font-family: var(--mono); letter-spacing: .08em; text-transform: uppercase; font-weight: 700; }
  .add-btn:hover { background: var(--accent2); }

  /* ——— stage tabs / tags ——— */
  .filters { display: flex; border-bottom: 1px solid var(--rule); margin-bottom: 4px; overflow-x: auto; }
  .filter-btn { background: transparent; border: none; padding: 12px 11px; font-size: 15px; white-space: nowrap; flex: 0 0 auto; color: var(--muted); border-bottom: 3px solid transparent; font-family: var(--serif); }
  .filter-btn .tw1 { font-weight: 700; }
  .filter-btn .tw2 { font-style: italic; color: var(--faint); }
  .filter-btn .twc { font-family: var(--mono); font-size: 11px; color: var(--faint); }
  .filter-btn.active { color: var(--ink); border-bottom-color: var(--accent2); }
  .filter-btn.active .tw2 { color: var(--accent2); }
  .tag-filters { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0 6px; }
  .tag-chip { border: 1px solid var(--rule); border-radius: 999px; padding: 3px 11px; font-size: 12px; background: var(--card); color: var(--muted); font-family: var(--mono); }
  .tag-chip.active { background: var(--accent); border-color: var(--accent); color: var(--onaccent); }

  /* ——— bit cards ——— */
  .day-header { display: flex; align-items: center; gap: 10px; font-size: 11px; font-weight: 700; letter-spacing: .1em; color: var(--faint); text-transform: uppercase; padding: 18px 0 8px; font-family: var(--mono); }
  .day-header::after { content: ""; flex: 1; height: 1px; background: var(--rule); }
  .bit { padding: 13px 15px; background: var(--card); border: 1px solid var(--rule); border-radius: 9px; margin-bottom: 9px; box-shadow: var(--cardshadow); }
  .bit-text { margin: 0 0 9px; font-size: 16px; line-height: 1.6; white-space: pre-wrap; cursor: pointer; }
  .bit-text.clamp { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .edit-btn { background: transparent; border: none; color: var(--faint); font-size: 11.5px; font-family: var(--mono); padding: 2px 6px; }
  .edit-btn:hover { color: var(--accent); }
  .edit-area { width: 100%; border: 1px solid var(--accent); border-radius: 7px; padding: 9px 10px; font-size: 16px; font-family: var(--serif); line-height: 1.6; margin: 0 0 9px; background: var(--card); color: var(--ink); min-height: 64px; resize: vertical; }
  .bit-meta { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
  .stage-wrap { border: 1px solid; border-radius: 999px; padding: 0 4px; font-size: 11px; font-family: var(--mono); letter-spacing: .03em; display: inline-flex; align-items: center; gap: 2px; }
  .stage-lab { padding: 2px 3px; }
  .stage-step { background: transparent; border: none; color: inherit; font-size: 14px; line-height: 1; padding: 2px 5px; opacity: .65; }
  .stage-step:hover { opacity: 1; }
  .st-notice { color: var(--st-concept); border-color: var(--st-concept); }
  .st-record { color: var(--st-bit); border-color: var(--st-bit); }
  .st-treasure { color: var(--st-ready); border-color: var(--st-ready); }
  .stale { color: var(--accent2); font-size: 11.5px; font-weight: 700; font-style: italic; font-family: var(--mono); }
  .bit-tag { background: var(--tagbg); border: none; border-radius: 999px; padding: 3px 10px; font-size: 11.5px; color: var(--tagink); font-family: var(--mono); }
  .add-tag-btn { background: transparent; border: 1px dashed var(--faint); border-radius: 999px; padding: 2px 10px; font-size: 11.5px; color: var(--faint); font-family: var(--mono); }
  .add-tag-btn:hover { color: var(--accent); border-color: var(--accent); }
  .tag-input { width: 90px; border: 1px solid var(--rule); border-radius: 5px; padding: 3px 7px; font-size: 13px; font-family: var(--mono); background: var(--card); color: var(--ink); }
  .delete-btn { background: transparent; border: none; color: var(--faint); font-size: 13px; margin-left: auto; padding: 2px 6px; opacity: .7; }
  .delete-btn:hover { color: var(--accent2); opacity: 1; }
  .empty { color: var(--faint); font-style: italic; font-size: 15px; padding: 14px 2px; }

  .backup { margin-top: 40px; padding-top: 14px; border-top: 1px solid var(--rule); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .backup button { background: var(--card); border: 1px solid var(--rule); color: var(--muted); border-radius: 999px; padding: 4px 12px; font-size: 11.5px; font-family: var(--mono); }
  .backup button:hover { border-color: var(--accent); color: var(--accent); }
  .backup-note { font-size: 11.5px; color: var(--faint); font-style: italic; }
</style>
</head>

  <div class="capture">
    <textarea id="draft" rows="3"></textarea>
    <button class="add-btn" id="addBtn">Add</button>
  </div>

  <div class="filters" id="filters"></div>
  <div class="tag-filters" id="tagFilters"></div>
  <div id="list"></div>
  <p class="empty" id="empty" style="display:none"></p>

  <div class="day-header" style="padding-top:30px">the daily walk</div>
  <div class="strip">
    <div class="srow">
      <span class="slabel">steps recorded this week</span>
      <span class="lab"><strong id="weekCount">0</strong>/<strong id="quotaShow">7</strong></span>
      <input type="number" min="1" id="quotaInput" class="quota-input" aria-label="weekly step quota" />
      <svg class="stairs" viewBox="0 0 178 46" aria-hidden="true">
        <rect class="stair" x="2"   y="38" width="20" height="6" rx="1.5"/>
        <rect class="stair" x="25"  y="32" width="20" height="12" rx="1.5"/>
        <rect class="stair" x="48"  y="26" width="20" height="18" rx="1.5"/>
        <rect class="stair" x="71"  y="20" width="20" height="24" rx="1.5"/>
        <rect class="stair" x="94"  y="14" width="20" height="30" rx="1.5"/>
        <rect class="stair" x="117" y="8"  width="20" height="36" rx="1.5"/>
        <rect class="stair" x="140" y="2"  width="20" height="42" rx="1.5"/>
        <path class="star" d="M169,2 L170.9,6.1 L175,6.8 L172,9.7 L172.8,14 L169,11.9 L165.2,14 L166,9.7 L163,6.8 L167.1,6.1 Z"/>
      </svg>
    </div>
    <div class="srow">
      <label class="riff-check"><span class="slabel">did you think to pray?</span>
        <input type="checkbox" id="riffCheck" />
        <span class="stamp"><span class="off">not yet</span><span class="on">✓ done</span></span>
      </label>
      <span class="riff-week" id="riffWeek"></span>
    </div>
    <div class="srow">
      <label class="riff-check"><span class="slabel">have you done any good in the world today?</span>
        <input type="checkbox" id="goodCheck" />
        <span class="stamp"><span class="off">not yet</span><span class="on">✓ done</span></span>
      </label>
      <span class="riff-week" id="goodWeek"></span>
    </div>
    <div class="srow">
      <span class="slabel">served</span>
      <span class="lab"><strong id="micCount">0</strong><span class="last-mic" id="lastMic"></span></span>
      <button class="mic-btn" id="planBtn">+ plan to serve</button>
    </div>
    <div id="planForm" class="plan-form" style="display:none">
      <input type="datetime-local" id="planWhen" />
      <input type="text" id="planNote" placeholder="with whom (optional)" />
      <button id="planSave" class="mic-btn">Save</button>
    </div>
    <div id="planned"></div>
  </div>

  <div class="backup">
    <button id="exportBtn">Export backup</button>
    <button id="importBtn">Import</button>
    <input type="file" id="importFile" accept=".json" style="display:none" />
    <span class="backup-note">Your data lives on this device only.</span>
  </div>
</div>

<script>
(function () {
  var KEY = "steps-unto-heavn";
  var DAY = 86400000;
  var STALE_DAYS = 14;
  var NEXT = { notice: "record", record: "treasure", treasure: "notice", bishop: "notice" };
  var PREV = { notice: "treasure", record: "notice", treasure: "record", bishop: "notice" };
  var STAGE = {
    notice: { label: "noticed" },
    record: { label: "recorded" },
    treasure: { label: "treasured" },
    bishop: { label: "noticed" }
  };
  var STAGES = ["notice", "record", "treasure"];
  var PLACEHOLDERS = [
    "Thank the Lord thy God in all things. \u2014 D&C 59:7",
    "Live in thanksgiving daily. \u2014 Alma 34:38",
    "All things denote there is a God. \u2014 Alma 30:44",
    "The heavens declare the glory of God. \u2014 Psalm 19:1",
    "The earth is full of the goodness of the Lord. \u2014 Psalm 33:5",
    "He who receiveth all things with thankfulness shall be made glorious. \u2014 D&C 78:19",
    "Confess his hand in all things. \u2014 D&C 59:21",
    "Made to please the eye and to gladden the heart. \u2014 D&C 59:18",
    "O give thanks unto the Lord; for he is good. \u2014 Psalm 107:1",
    "Behold, it was very good. \u2014 Genesis 1:31",
    "Count your many blessings; name them one by one.",
    "This is my work and my glory. \u2014 Moses 1:39"
  ];

  var state = { bits: [], quota: 7, mics: [], riffs: [], good: [], planned: [] };
  var stageFilter = "notice";
  var tagFilter = null;
  var tagEditing = null;
  var textEditing = null;
  var expanded = null;

  function load() {
    try {
      var raw = localStorage.getItem(KEY);
      if (raw) {
        var data = JSON.parse(raw);
        state.bits = (data.bits || []).map(function (b) {
          if (b.status === "raw") b.status = "notice";
          if (b.status === "working") b.status = "record";
          if (!b.status || b.status === "bishop") b.status = "notice";
          if (!b.tags) b.tags = [];
          return b;
        });
        state.quota = data.quota || 7;
        state.mics = data.mics || [];
        state.riffs = data.riffs || [];
        state.good = data.good || [];
        state.planned = data.planned || [];
      }
    } catch (e) {}
  }

  function save() {
    try {
      localStorage.setItem(KEY, JSON.stringify(state));
    } catch (e) {
      alert("Save failed — storage may be full or blocked.");
    }
  }

  function startOfWeek() {
    var d = new Date();
    var day = d.getDay();
    var diff = day === 0 ? 6 : day - 1;
    d.setHours(0, 0, 0, 0);
    return d.getTime() - diff * DAY;
  }

  function staleDays(b) { return 0; }

  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  function render() {
    // strip
    var weekCount = state.bits.filter(function (b) { return b.created >= startOfWeek(); }).length;
    document.getElementById("weekCount").textContent = weekCount;
    document.getElementById("quotaShow").textContent = state.quota;
    document.getElementById("quotaInput").value = state.quota;
    var stairs = document.querySelectorAll(".stair");
    var lit = state.quota > 0 ? Math.round(Math.min(1, weekCount / state.quota) * stairs.length) : 0;
    for (var si = 0; si < stairs.length; si++) {
      stairs[si].classList.toggle("lit", si < lit);
    }
    document.querySelector(".star").classList.toggle("lit", weekCount >= state.quota);

    document.getElementById("micCount").textContent = state.mics.length;
    var lm = document.getElementById("lastMic");
    if (state.mics.length) {
      var lmd = new Date(state.mics[state.mics.length - 1]);
      lm.textContent = " (" + lmd.toLocaleDateString("en-US", { month: "short", day: "numeric" }) + ")";
    } else lm.textContent = "";

    var todayStart = new Date(); todayStart.setHours(0, 0, 0, 0);
    document.getElementById("riffCheck").checked = state.riffs.some(function (t) { return t >= todayStart.getTime(); });
    document.getElementById("riffWeek").textContent = state.riffs.filter(function (t) { return t >= startOfWeek(); }).length + " this week";
    document.getElementById("goodCheck").checked = state.good.some(function (t) { return t >= todayStart.getTime(); });
    document.getElementById("goodWeek").textContent = state.good.filter(function (t) { return t >= startOfWeek(); }).length + " this week";

    // planned mics
    var plannedEl = document.getElementById("planned");
    plannedEl.innerHTML = "";
    state.planned.sort(function (a, b2) { return a.when - b2.when; });
    state.planned.forEach(function (p) {
      var row = el("div", "planned-item");
      var when = new Date(p.when);
      row.appendChild(el("span", "planned-when",
        when.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" }) +
        " " + when.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" })));
      if (p.note) row.appendChild(el("span", "planned-note", p.note));
      if (p.when < Date.now()) row.appendChild(el("span", "planned-due", "— well?"));
      var did = el("button", "planned-did", "did it");
      did.onclick = function () {
        state.mics.push(p.when);
        var gd = new Date(); gd.setHours(0, 0, 0, 0);
        if (!state.good.some(function (t) { return t >= gd.getTime(); })) state.good.push(Date.now());
        state.planned = state.planned.filter(function (x) { return x.id !== p.id; });
        save(); render();
      };
      row.appendChild(did);
      var skip = el("button", "planned-skip", "\u2715");
      skip.setAttribute("aria-label", "remove planned mic");
      skip.onclick = function () {
        state.planned = state.planned.filter(function (x) { return x.id !== p.id; });
        save(); render();
      };
      row.appendChild(skip);
      plannedEl.appendChild(row);
    });

    // filters
    var filters = document.getElementById("filters");
    filters.innerHTML = "";
    var TABWORDS = { notice: ["Notice", "Light"], record: ["Record", "Truth"], treasure: ["Treasure", "Experience"] };
    STAGES.forEach(function (s) {
      var count = state.bits.filter(function (b) { return b.status === s; }).length;
      var btn = el("button", "filter-btn" + (stageFilter === s ? " active" : ""));
      btn.appendChild(el("span", "tw1", TABWORDS[s][0] + " "));
      btn.appendChild(el("span", "tw2", TABWORDS[s][1]));
      btn.appendChild(el("span", "twc", " (" + count + ")"));
      btn.onclick = function () { stageFilter = s; render(); };
      filters.appendChild(btn);
    });

    // tag filters
    var allTags = [];
    state.bits.forEach(function (b) {
      b.tags.forEach(function (t) { if (allTags.indexOf(t) === -1) allTags.push(t); });
    });
    allTags.sort();
    var tf = document.getElementById("tagFilters");
    tf.innerHTML = "";
    allTags.forEach(function (t) {
      var chip = el("button", "tag-chip" + (tagFilter === t ? " active" : ""), t);
      chip.onclick = function () { tagFilter = tagFilter === t ? null : t; render(); };
      tf.appendChild(chip);
    });

    // list
    var list = document.getElementById("list");
    list.innerHTML = "";
    var visible = state.bits.filter(function (b) {
      return b.status === stageFilter && (!tagFilter || b.tags.indexOf(tagFilter) !== -1);
    });
    visible.sort(function (a, b2) { return b2.created - a.created; });

    var lastDayKey = null;
    visible.forEach(function (b) {
      var d = new Date(b.created);
      var dayKey = d.getFullYear() + "-" + d.getMonth() + "-" + d.getDate();
      if (dayKey !== lastDayKey) {
        lastDayKey = dayKey;
        var today = new Date(); today.setHours(0,0,0,0);
        var thatDay = new Date(d); thatDay.setHours(0,0,0,0);
        var diff = Math.round((today - thatDay) / DAY);
        var label;
        if (diff === 0) label = "Today";
        else if (diff === 1) label = "Yesterday";
        else label = d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
        list.appendChild(el("div", "day-header", label));
      }
      renderCard(b, list);
    });

    function renderCard(b, list) {
      var card = el("div", "record");

      if (textEditing === b.id) {
        var editArea = document.createElement("textarea");
        editArea.className = "edit-area";
        editArea.value = b.text;
        function commitText() {
          var v = editArea.value.trim();
          if (v) b.text = v;
          textEditing = null;
          save(); render();
        }
        editArea.onblur = commitText;
        editArea.onkeydown = function (e) {
          if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) commitText();
          if (e.key === "Escape") { textEditing = null; render(); }
        };
        card.appendChild(editArea);
        setTimeout(function () {
          editArea.focus();
          editArea.setSelectionRange(editArea.value.length, editArea.value.length);
        }, 0);
      } else {
        var p = el("p", "bit-text" + (expanded === b.id ? "" : " clamp"), b.text);
        p.title = expanded === b.id ? "Tap to collapse" : "Tap to expand";
        p.onclick = function () { expanded = expanded === b.id ? null : b.id; render(); };
        card.appendChild(p);
      }

      var meta = el("div", "bit-meta");

      var stageWrap = el("span", "stage-wrap st-" + b.status);
      var back = el("button", "stage-step", "\u2039");
      back.title = "Move back";
      back.onclick = function () { b.status = PREV[b.status]; b.statusAt = Date.now(); save(); render(); };
      var stageLab = el("span", "stage-lab", STAGE[b.status].label);
      var fwd = el("button", "stage-step", "\u203A");
      fwd.title = "Move forward";
      fwd.onclick = function () { b.status = NEXT[b.status]; b.statusAt = Date.now(); save(); render(); };
      stageWrap.appendChild(back); stageWrap.appendChild(stageLab); stageWrap.appendChild(fwd);
      meta.appendChild(stageWrap);

      var sd = staleDays(b);
      if (sd > 0) {
        var st = el("span", "stale", "\u23F3 stale " + sd + "d");
        st.title = "Advance it or kill it";
        meta.appendChild(st);
      }

      b.tags.forEach(function (t) {
        var tag = el("button", "bit-tag", t + " \u2715");
        tag.title = "Tap to remove tag";
        tag.onclick = function () {
          b.tags = b.tags.filter(function (x) { return x !== t; });
          save(); render();
        };
        meta.appendChild(tag);
      });

      if (tagEditing === b.id) {
        var input = el("input", "tag-input");
        input.placeholder = "tag";
        function commit() {
          var v = input.value.trim().toLowerCase();
          if (v && b.tags.indexOf(v) === -1) b.tags.push(v);
          tagEditing = null;
          save(); render();
        }
        input.onkeydown = function (e) { if (e.key === "Enter") commit(); };
        input.onblur = commit;
        meta.appendChild(input);
        setTimeout(function () { input.focus(); }, 0);
      } else {
        var addTag = el("button", "add-tag-btn", "+ tag");
        addTag.onclick = function () { tagEditing = b.id; render(); };
        meta.appendChild(addTag);
      }

      var ed = el("button", "edit-btn", "✎ edit");
      ed.onclick = function () { textEditing = b.id; expanded = b.id; render(); };
      meta.appendChild(ed);

      var del = el("button", "delete-btn", "\u2715");
      del.setAttribute("aria-label", "delete bit");
      del.onclick = function () {
        state.bits = state.bits.filter(function (x) { return x.id !== b.id; });
        save(); render();
      };
      meta.appendChild(del);

      card.appendChild(meta);
      list.appendChild(card);
    }

    var empty = document.getElementById("empty");
    if (visible.length === 0) {
      empty.style.display = "";
      empty.textContent = state.bits.length === 0 ? "Nothing yet." : "Nothing here. Adjust the filter.";
    } else {
      empty.style.display = "none";
    }
  }

  // wiring
  var draft = document.getElementById("draft");
  draft.placeholder = PLACEHOLDERS[Math.floor(Math.random() * PLACEHOLDERS.length)];

  function addBit() {
    var text = draft.value.trim();
    if (!text) return;
    state.bits.unshift({
      id: Date.now().toString(36),
      text: text,
      status: "notice",
      tags: [],
      created: Date.now(),
      statusAt: Date.now()
    });
    draft.value = "";
    draft.placeholder = PLACEHOLDERS[Math.floor(Math.random() * PLACEHOLDERS.length)];
    save(); render();
  }
  document.getElementById("addBtn").onclick = addBit;
  draft.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) addBit();
  });

  document.getElementById("quotaInput").onchange = function (e) {
    state.quota = parseInt(e.target.value) || 1;
    save(); render();
  };


  function dailyToggle(arrName) {
    return function (e) {
      var todayStart = new Date(); todayStart.setHours(0, 0, 0, 0);
      if (e.target.checked) {
        state[arrName].push(Date.now());
      } else {
        state[arrName] = state[arrName].filter(function (t) { return t < todayStart.getTime(); });
      }
      save(); render();
    };
  }
  document.getElementById("riffCheck").onchange = dailyToggle("riffs");
  document.getElementById("goodCheck").onchange = dailyToggle("good");

  // plan a mic
  document.getElementById("planBtn").onclick = function () {
    var f = document.getElementById("planForm");
    f.style.display = f.style.display === "none" ? "flex" : "none";
  };
  document.getElementById("planSave").onclick = function () {
    var whenVal = document.getElementById("planWhen").value;
    if (!whenVal) { alert("Pick a date and time."); return; }
    state.planned.push({
      id: Date.now().toString(36),
      when: new Date(whenVal).getTime(),
      note: document.getElementById("planNote").value.trim()
    });
    document.getElementById("planWhen").value = "";
    document.getElementById("planNote").value = "";
    document.getElementById("planForm").style.display = "none";
    save(); render();
  };

  // backup
  document.getElementById("exportBtn").onclick = function () {
    var blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "steps-backup-" + new Date().toISOString().slice(0, 10) + ".json";
    a.click();
    URL.revokeObjectURL(a.href);
  };
  document.getElementById("importBtn").onclick = function () {
    document.getElementById("importFile").click();
  };
  document.getElementById("importFile").onchange = function (e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var data = JSON.parse(reader.result);
        if (!data.bits) throw new Error("bad file");
        if (!confirm("Replace current notebook with this backup?")) return;
        state = { bits: data.bits || [], quota: data.quota || 7, mics: data.mics || [] };
        save(); render();
      } catch (err) {
        alert("Couldn't read that file. It needs to be a backup exported from this notebook.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  load();
  render();
})();
</script>
</body>
</html>
